<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Marvel</title>

    <style>

        body{
            margin:0;
            background-color:#111;
            color:white;
            font-family:Arial;
        }

        .menu{
            background:black;
            padding:20px;
            text-align:center;
        }

        .menu a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:20px;
        }

        .menu a:hover{
            color:red;
        }

        .banner{
            text-align:center;
            padding:40px;
        }

        .banner img{
            width:80%;
            border-radius:10px;
        }

        .titulo{
            font-size:60px;
            color:red;
        }

        .personajes{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:30px;
        }

        .personajes img{
            width:250px;
            height:350px;
            border-radius:10px;
        }

    </style>

</head>

<body>

    <!-- MENU -->
    <div class="menu">
        <a href="">Inicio</a>
        <a href="">Películas</a>
        <a href="">Personajes</a>
        <a href="">Series</a>
    </div>

    <!-- TITULO -->
    <div class="banner">

        <h1 class="titulo">MARVEL STUDIOS</h1>

        <!-- IMAGEN PRINCIPAL -->
        <img src="https://wallpapercave.com/wp/wp2599594.jpg">

    </div>

    <!-- PERSONAJES -->
    <div class="personajes">

        <img src="https://wallpapercave.com/wp/wp4056410.jpg">

        <img src="https://wallpapercave.com/wp/wp4056416.jpg">

    </div>

</body>

</html>
